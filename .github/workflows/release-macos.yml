name: "Release macOS (Intel & Apple Silicon)"

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: llm-config-hub

jobs:
  build-arch:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: intel
            target: x86_64-apple-darwin
            artifact_name: intel-app
            volume_suffix: Intel
          - arch: arm64
            target: aarch64-apple-darwin
            artifact_name: arm64-app
            volume_suffix: Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2

      - name: Build macOS
        run: npx tauri build --target ${{ matrix.target }}

      - name: Find bundle path
        id: find-bundle
        run: |
          find src-tauri/target -name "*.app" -type d 2>/dev/null
          BUNDLE_PATH=$(find src-tauri/target -name "*.app" -type d 2>/dev/null | head -n1)
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> $GITHUB_OUTPUT

      - name: List bundle contents
        run: ls -la "${{ steps.find-bundle.outputs.BUNDLE_PATH }}/Contents/MacOS/"

      - name: Archive .app bundle
        run: |
          bundle="${{ steps.find-bundle.outputs.BUNDLE_PATH }}"
          bundle_name=$(basename "$bundle")
          archive_dir="artifacts/${{ matrix.arch }}"
          archive_path="$archive_dir/${bundle_name}.tar.gz"
          mkdir -p "$archive_dir"
          tar -czf "$archive_path" -C "$(dirname "$bundle")" "$bundle_name"

      - name: Upload .app archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.arch }}/*.tar.gz

      - name: Create DMG
        run: |
          bundle="${{ steps.find-bundle.outputs.BUNDLE_PATH }}"
          dmg_path="artifacts/${{ matrix.arch }}/${APP_NAME}-${{ matrix.arch }}-macos.dmg"
          mkdir -p "artifacts/${{ matrix.arch }}"
          hdiutil create -volname "${APP_NAME} ${{ matrix.volume_suffix }}" -srcfolder "$bundle" -ov -format UDZO "$dmg_path"

      - name: Upload DMG artifact
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.arch }}/*.dmg
          generate_release_notes: false
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-universal:
    needs: [build-arch]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Intel .app
        uses: actions/download-artifact@v4
        with:
          name: intel-app
          path: build/intel-archive

      - name: Download ARM64 .app
        uses: actions/download-artifact@v4
        with:
          name: arm64-app
          path: build/arm64-archive

      - name: Extract Intel .app
        run: |
          mkdir -p build/intel
          tar -xzf build/intel-archive/*.tar.gz -C build/intel

      - name: Extract ARM64 .app
        run: |
          mkdir -p build/arm64
          tar -xzf build/arm64-archive/*.tar.gz -C build/arm64

      - name: List downloaded files
        run: |
          echo "=== Intel bundle structure ==="
          find build/intel -type f -name "*" 2>/dev/null | head -20
          echo "=== ARM64 bundle structure ==="
          find build/arm64 -type f -name "*" 2>/dev/null | head -20
          echo "=== Intel .app contents ==="
          ls -laR build/intel/*.app/Contents/MacOS/ 2>/dev/null || echo "No Intel .app found"
          echo "=== ARM64 .app contents ==="
          ls -laR build/arm64/*.app/Contents/MacOS/ 2>/dev/null || echo "No ARM64 .app found"

      - name: Locate Intel binary (universal)
        id: locate-intel-univ
        run: |
          intel_bundle=$(find build/intel -name "*.app" -type d 2>/dev/null | head -n1)
          echo "Intel bundle: $intel_bundle"
          if [ -z "$intel_bundle" ]; then
            echo "INTEL_BIN=" >> $GITHUB_OUTPUT
            echo "INTEL_BUNDLE=" >> $GITHUB_OUTPUT
          else
            if [ -f "$intel_bundle/Contents/MacOS/$APP_NAME" ]; then
              INTEL_BIN="$intel_bundle/Contents/MacOS/$APP_NAME"
            else
              INTEL_BIN=$(ls -1 "$intel_bundle/Contents/MacOS/"* 2>/dev/null | head -n1)
            fi
            echo "Intel binary: $INTEL_BIN"
            echo "Intel bundle output: $intel_bundle"
            echo "INTEL_BUNDLE=$intel_bundle" >> $GITHUB_OUTPUT
            echo "INTEL_BIN=$INTEL_BIN" >> $GITHUB_OUTPUT
          fi

      - name: Locate ARM binary (universal)
        id: locate-arm-univ
        run: |
          arm_bundle=$(find build/arm64 -name "*.app" -type d 2>/dev/null | head -n1)
          echo "ARM bundle: $arm_bundle"
          if [ -z "$arm_bundle" ]; then
            echo "ARM_BIN=" >> $GITHUB_OUTPUT
            echo "ARM_BUNDLE=" >> $GITHUB_OUTPUT
          else
            if [ -f "$arm_bundle/Contents/MacOS/$APP_NAME" ]; then
              ARM_BIN="$arm_bundle/Contents/MacOS/$APP_NAME"
            else
              ARM_BIN=$(ls -1 "$arm_bundle/Contents/MacOS/"* 2>/dev/null | head -n1)
            fi
            echo "ARM binary: $ARM_BIN"
            echo "ARM bundle output: $arm_bundle"
            echo "ARM_BUNDLE=$arm_bundle" >> $GITHUB_OUTPUT
            echo "ARM_BIN=$ARM_BIN" >> $GITHUB_OUTPUT
          fi

      - name: "Debug: Universal preflight"
        run: |
          INTEL_BIN="${{ steps.locate-intel-univ.outputs.INTEL_BIN }}"
          ARM_BIN="${{ steps.locate-arm-univ.outputs.ARM_BIN }}"
          echo "INTEL_BIN_PRE=$INTEL_BIN"
          echo "ARM_BIN_PRE=$ARM_BIN"
          if [ -z "$INTEL_BIN" ]; then
            echo "Intel bin not set yet; listing intel build candidates..."
            ls -la build/intel 2>/dev/null || true
          fi
          if [ -z "$ARM_BIN" ]; then
            echo "Arm bin not set yet; listing arm64 build candidates..."
            ls -la build/arm64 2>/dev/null || true
          fi
      - name: Create Universal Binary
        run: |
          intel_bin="${{ steps.locate-intel-univ.outputs.INTEL_BIN }}"
          arm_bin="${{ steps.locate-arm-univ.outputs.ARM_BIN }}"
          echo "INTEL_BIN=$intel_bin"
          echo "ARM_BIN=$arm_bin"
          if [ -z "$intel_bin" ]; then
            intel_bundle=$(find build/intel -name "*.app" -type d 2>/dev/null | head -n1)
            if [ -n "$intel_bundle" ]; then
              if [ -f "$intel_bundle/Contents/MacOS/$APP_NAME" ]; then
                intel_bin="$intel_bundle/Contents/MacOS/$APP_NAME"
              else
                intel_bin=$(ls -1 "$intel_bundle/Contents/MacOS/"* 2>/dev/null | head -n1)
              fi
            fi
          fi
          if [ -z "$arm_bin" ]; then
            arm_bundle=$(find build/arm64 -name "*.app" -type d 2>/dev/null | head -n1)
            if [ -n "$arm_bundle" ]; then
              if [ -f "$arm_bundle/Contents/MacOS/$APP_NAME" ]; then
                arm_bin="$arm_bundle/Contents/MacOS/$APP_NAME"
              else
                arm_bin=$(ls -1 "$arm_bundle/Contents/MacOS/"* 2>/dev/null | head -n1)
              fi
            fi
          fi
          universal_bin="build/universal/$APP_NAME-universal"
          mkdir -p build/universal
          if [ -z "$intel_bin" ] || [ -z "$arm_bin" ]; then
            echo "Missing binaries after fallback: INTEL_BIN='$intel_bin', ARM_BIN='$arm_bin'"
            exit 1
          fi
          lipo -create "$intel_bin" "$arm_bin" -o "$universal_bin"

      - name: Create Universal App
        run: |
          intel_bundle="${{ steps.locate-intel-univ.outputs.INTEL_BUNDLE }}"
          intel_bin="${{ steps.locate-intel-univ.outputs.INTEL_BIN }}"
          if [ -z "$intel_bundle" ]; then
            intel_bundle=$(find build/intel -name "*.app" -type d 2>/dev/null | head -n1)
          fi
          if [ -z "$intel_bin" ]; then
            if [ -f "$intel_bundle/Contents/MacOS/$APP_NAME" ]; then
              intel_bin="$intel_bundle/Contents/MacOS/$APP_NAME"
            else
              intel_bin=$(ls -1 "$intel_bundle/Contents/MacOS/"* 2>/dev/null | head -n1)
            fi
          fi
          if [ -z "$intel_bundle" ] || [ -z "$intel_bin" ]; then
            echo "Unable to locate Intel bundle or executable for universal app creation"
            exit 1
          fi
          intel_exec_name=$(basename "$intel_bin")
          universal_app_dir="build/universal/${APP_NAME}-universal.app"
          cp -R "$intel_bundle" "$universal_app_dir"
          cp "build/universal/$APP_NAME-universal" "$universal_app_dir/Contents/MacOS/$intel_exec_name"

      - name: Create Universal DMG
        run: |
          dmg_path="artifacts/universal/${APP_NAME}-universal-macos.dmg"
          mkdir -p artifacts/universal
          hdiutil create -volname "${APP_NAME} Universal" -srcfolder "build/universal/${APP_NAME}-universal.app" -ov -format UDZO "$dmg_path"

      - name: Upload Universal artifact
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/universal/*.dmg
          generate_release_notes: false
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
