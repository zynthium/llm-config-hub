name: Release macOS (Intel & Apple Silicon)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: false
        default: ''

jobs:
  build-intel:
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine App Name
        id: appname
        run: |
          APP_NAME="llm-config-hub"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        run: rustup default stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Intel macOS
        run: |
          rustup target add x86_64-apple-darwin
          cargo tauri build --target x86_64-apple-darwin

      - name: Find bundle path
        id: find-bundle
        run: |
          BUNDLE_PATH=$(find src-tauri/target -name "*.app" -type d 2>/dev/null | head -n1)
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> $GITHUB_OUTPUT

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: intel-app
          path: ${{ steps.find-bundle.outputs.BUNDLE_PATH }}

      - name: Create Intel DMG
        run: |
          intel_bundle="${{ steps.find-bundle.outputs.BUNDLE_PATH }}"
          APP_NAME="${{ steps.appname.outputs.APP_NAME }}"
          dmg_path="artifacts/intel/${APP_NAME}-intel-macos.dmg"
          mkdir -p artifacts/intel
          hdiutil create -volname "${APP_NAME} Intel" -srcfolder "$intel_bundle" -ov -format UDZO "$dmg_path"

      - name: Upload Intel artifact
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/intel/*.dmg
          generate_release_notes: false
          tag_name: ${{ env.TAG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arm64:
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine App Name
        id: appname
        run: |
          APP_NAME="llm-config-hub"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        run: rustup default stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build ARM64 macOS
        run: |
          rustup target add aarch64-apple-darwin
          cargo tauri build --target aarch64-apple-darwin

      - name: Find bundle path
        id: find-bundle
        run: |
          BUNDLE_PATH=$(find src-tauri/target -name "*.app" -type d 2>/dev/null | head -n1)
          echo "BUNDLE_PATH=$BUNDLE_PATH" >> $GITHUB_OUTPUT

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: arm64-app
          path: ${{ steps.find-bundle.outputs.BUNDLE_PATH }}

      - name: Create ARM64 DMG
        run: |
          arm_bundle="${{ steps.find-bundle.outputs.BUNDLE_PATH }}"
          APP_NAME="${{ steps.appname.outputs.APP_NAME }}"
          dmg_path="artifacts/arm64/${APP_NAME}-arm64-macos.dmg"
          mkdir -p artifacts/arm64
          hdiutil create -volname "${APP_NAME} Apple Silicon" -srcfolder "$arm_bundle" -ov -format UDZO "$dmg_path"

      - name: Upload ARM64 artifact
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/arm64/*.dmg
          generate_release_notes: false
          tag_name: ${{ env.TAG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-universal:
    needs: [build-intel, build-arm64]
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine App Name
        id: appname
        run: |
          APP_NAME="llm-config-hub"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Download Intel .app
        uses: actions/download-artifact@v4
        with:
          name: intel-app
          path: build/intel

      - name: Download ARM64 .app
        uses: actions/download-artifact@v4
        with:
          name: arm64-app
          path: build/arm64

      - name: Create Universal Binary
        run: |
          APP_NAME="${{ steps.appname.outputs.APP_NAME }}"
          intel_exec="build/intel/$APP_NAME.app/Contents/MacOS/$APP_NAME"
          arm_exec="build/arm64/$APP_NAME.app/Contents/MacOS/$APP_NAME"
          universal_bin="build/universal/$APP_NAME-universal"
          mkdir -p build/universal
          lipo -create "$intel_exec" "$arm_exec" -o "$universal_bin"

      - name: Create Universal App
        run: |
          APP_NAME="${{ steps.appname.outputs.APP_NAME }}"
          intel_bundle="build/intel/$APP_NAME.app"
          universal_app_dir="build/universal/${APP_NAME}-universal.app"
          cp -R "$intel_bundle" "$universal_app_dir"
          cp "build/universal/$APP_NAME-universal" "$universal_app_dir/Contents/MacOS/$APP_NAME"

      - name: Create Universal DMG
        run: |
          APP_NAME="${{ steps.appname.outputs.APP_NAME }}"
          dmg_path="artifacts/universal/${APP_NAME}-universal-macos.dmg"
          mkdir -p artifacts/universal
          hdiutil create -volname "${APP_NAME} Universal" -srcfolder "build/universal/${APP_NAME}-universal.app" -ov -format UDZO "$dmg_path"

      - name: Upload Universal artifact
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/universal/*.dmg
          generate_release_notes: false
          tag_name: ${{ env.TAG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
